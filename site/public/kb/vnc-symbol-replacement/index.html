<!doctype html><html lang=ru><head><meta charset=utf-8><title>Подмена символов в VNC при копировании команд – База знаний</title><style>body{font-family:system-ui,sans-serif;max-width:700px;margin:2em auto;padding:0 1em}a{color:#0366d6}article{margin:1em 0}</style></head><body><h1>Подмена символов в VNC при копировании команд</h1><article><h2 id=проблема>Проблема</h2><p>При копировании через буфер обмена VNC символы искажались (например, <code>_</code> → <code>-</code>), из-за чего конфиги SSH не применялись.</p><h2 id=решение>Решение</h2><p>Использовать <code>echo</code> или heredoc внутри VNC, избегая вставки. Проверять файлы через <code>cat -A</code>.</p></article><p><a href=/kb>← К списку статей</a></p></body></html>
