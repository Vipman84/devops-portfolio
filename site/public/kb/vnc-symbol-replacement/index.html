<!doctype html><html lang=ru><head><meta charset=utf-8><title>Подмена символов в VNC при копировании команд — devops.ai-donate.ru</title><style>body{background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem}a{color:#a5f0ff}</style></head><body><a href=/kb/>← Назад к базе знаний</a><h1>Подмена символов в VNC при копировании команд</h1><h2 id=проблема>Проблема</h2><p>При копировании через буфер обмена VNC символы искажались (например, <code>_</code> → <code>-</code>), из-за чего конфиги SSH не применялись.</p><h2 id=решение>Решение</h2><p>Использовать <code>echo</code> или heredoc внутри VNC, избегая вставки. Проверять файлы через <code>cat -A</code>.</p></body></html>
