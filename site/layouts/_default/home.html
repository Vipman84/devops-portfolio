<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2em auto; padding: 0 1em; line-height: 1.6; }
        a { color: #0366d6; }
    </style>
</head>
<body>
    <h1>{{ .Title }}</h1>

    <ul>
    {{ range .Site.RegularPages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a> — {{ .Date.Format "2006-01-02" }}</li>
    {{ end }}
    </ul>
</body>
</html>
<p><a href="/kb/">📚 База знаний</a></p>
