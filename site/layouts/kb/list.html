<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>База знаний – {{ .Site.Title }}</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2em auto; padding: 0 1em; }
        a { color: #0366d6; }
    </style>
</head>
<body>
    <h1>База знаний</h1>
    <ul>
        {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a> – {{ .Date.Format "2006-01-02" }}</li>
        {{ end }}
    </ul>
    <p><a href="{{ .Site.Home.RelPermalink }}">← На главную</a></p>
</body>
</html>
