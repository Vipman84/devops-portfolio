apiVersion: apps/v1
kind: Deployment
metadata:
  name: textbook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: textbook
  template:
    metadata:
      labels:
        app: textbook
    spec:
      containers:
      - name: textbook
        image: textbook:local
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: textbook-svc
spec:
  selector:
    app: textbook
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
